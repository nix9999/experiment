<!DOCTYPE html>
<html>
<head>
  <title>Video Downloader</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
    }

    input {
      padding: 10px;
      width: 250px;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      margin-top: 15px;
      width: 100%;
      background: #3b82f6;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Video Downloader</h2>

    <form action="/download" method="POST">
      <input type="text" name="url" placeholder="Paste YouTube link" required>
      <br>
      <button type="submit">Download</button>
    </form>

  </div>
</body>
</html>
